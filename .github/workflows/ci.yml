name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust ────────────────────────────────────────────────────────────────────
  rust:
    name: Rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (warnings as errors)
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test --release

      - name: Benchmarks compile-check
        run: cargo bench --no-run

  # ── Python ──────────────────────────────────────────────────────────────────
  python:
    name: Python ${{ matrix.py }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        py: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}

      # Rust is required because pyproject.toml uses maturin as build backend.
      # Without cargo on PATH, pip install -e ".[dev]" fails immediately.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: pip install maturin

      - name: Install package + dev dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: python
        run: ruff check stratarouter/

      - name: Type check (mypy)
        working-directory: python
        run: mypy stratarouter/ --ignore-missing-imports || true

      - name: Tests
        working-directory: python
        run: pytest tests/ -v --tb=short

  # ── Security ────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet || true

      - name: Rust dependency audit
        working-directory: core
        run: cargo audit

      # pip-audit uses bash process substitution — must set shell explicitly.
      - name: Python dependency audit (pip-audit)
        working-directory: python
        shell: bash
        run: |
          pip install pip-audit --quiet
          pip install -e ".[dev]" --quiet
          pip-audit || true
